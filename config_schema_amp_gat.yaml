# AFDM AMP-GNN / AMP-GAT training config schema (aligned with current code)
#
# Used by:
# - src/python/train_afdm.py
# - src/python/eval_ber_afdm.py
# - src/python/afdm_utils.py
#
# Notes:
# 1) Paths are resolved relative to the config file directory.
# 2) data.dataset_path is deprecated and rejected by current code.
# 3) metadata must match split files (N/P/QAM_order/l_max/k_max and test SNR set).

data:
  # Required paths
  train_dataset_path: "../../data/snr_14db/afdm_train_snr_14db.mat"
  val_dataset_path: "../../data/snr_14db/afdm_val_snr_14db.mat"
  test_dataset_path: "../../data/snr_14db/afdm_test_snr_10db_16db.mat"
  dataset_meta_path: "../../data/snr_14db/dataset_meta.yaml"

  # Optional experiment tags (not used for file loading)
  SNR_train: 14
  l_max: 2
  k_max: 3

configs:
  - name: "amp_gat_default"
    model:
      # Required
      model_type: "amp_gat"   # amp_gnn | amp_gat
      n_iter: 6
      n_u: 10
      n_h: 14
      n_conv: 4
      n_mlp_hidden: 22

      # AMP-GAT options
      damp: 1.0
      n_heads: 2
      attn_dropout: 0.0
      use_edge_attr: true
      edge_attr_mode: "gram_triplet"   # gram | gram_triplet

    train:
      # Required
      batch_size: 32
      val_batch_size: 64
      lr: 5.0e-5
      n_epoch: 100
      max_grad_norm: 1.0
      scheduler_factor: 0.5
      scheduler_patience: 2

  - name: "amp_gnn_baseline"
    model:
      model_type: "amp_gnn"
      n_iter: 6
      n_u: 10
      n_h: 14
      n_conv: 4
      n_mlp_hidden: 22

      # These fields are ignored by amp_gnn but allowed for a unified schema
      damp: 1.0
      n_heads: 1
      attn_dropout: 0.0
      use_edge_attr: false
      edge_attr_mode: "gram"

    train:
      batch_size: 32
      val_batch_size: 64
      lr: 5.0e-5
      n_epoch: 100
      max_grad_norm: 1.0
      scheduler_factor: 0.5
      scheduler_patience: 2
