# AMP-GAT 实验的草图配置结构与示例。
# 本文件仅用于设计说明，不会覆盖 backup/python/config/train_config.yaml。

data:
  SNR_train: 15
  l_max: 5
  k_max: 2

configs:
  - name: "amp_gat_default"
    model:
      # 必选模型类型
      model_type: "amp_gat"   # 可选: amp_gnn, amp_gat

      # 核心迭代与隐藏层规模
      n_iter: 6
      n_u: 12
      n_h: 12
      n_conv: 2
      n_mlp_hidden: 16

      # AMP+GAT 专属参数
      damp: 0.7               # [0,1]，1.0 表示不启用阻尼
      n_heads: 2
      attn_dropout: 0.0
      use_edge_attr: true
      edge_attr_mode: "gram_triplet"   # gram | gram_triplet

      # 可选扩展开关
      use_ce_loss: false
      ce_weight: 0.1

    train:
      batch_size: 32
      val_batch_size: 64
      lr: 5.0e-5
      n_epoch: 45
      max_grad_norm: 1.0
      scheduler_factor: 0.5
      scheduler_patience: 2

  - name: "amp_gnn_baseline"
    model:
      model_type: "amp_gnn"
      n_iter: 6
      n_u: 12
      n_h: 12
      n_conv: 2
      n_mlp_hidden: 16
      damp: 1.0
      n_heads: 1
      attn_dropout: 0.0
      use_edge_attr: false
      edge_attr_mode: "gram"
      use_ce_loss: false
      ce_weight: 0.0
    train:
      batch_size: 32
      val_batch_size: 64
      lr: 5.0e-5
      n_epoch: 45
      max_grad_norm: 1.0
      scheduler_factor: 0.5
      scheduler_patience: 2
